name: ci

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g markdownlint-cli2
      - run: markdownlint-cli2 "**/*.md"

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: typos-cli
      - run: typos

  rust-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  rust-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy (pedantic + nursery + cargo) -D warnings
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  rust-doc:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --all-features --no-deps

  public-api:
    # Lists the public API of portability crates on every PR.
    # After v0.1.0 is tagged, switch to:
    #   cargo public-api --diff-git-checkouts v0.1.0 HEAD
    # and promote this job to a required status check.
    continue-on-error: true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: rust version sanity check
        run: |
          rustup show active-toolchain
          rustc +nightly --version
          cargo +nightly --version

      - name: install cargo-public-api
        run: cargo +nightly install cargo-public-api --version 0.51.0 --force --locked

      - name: public API — snipper-core
        run: cargo +nightly public-api --manifest-path crates/snipper-core/Cargo.toml
        # snipper-context deferred: ?Sized TraitBound modifier in its rustdoc
        # JSON is not yet handled by any cargo-public-api version that also
        # compiles on stable/nightly as of nightly-2026-05-30.

  xtask-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - name: generate extension manifests
        run: cargo run -p xtask -- generate-extension-manifests
      - name: diff check — generated files must be up to date
        run: git diff --exit-code extensions/

  vscode-extension-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - name: build snipper-lsp
        run: cargo build -p snipper-lsp
      - name: stage LSP binary for extension tests
        run: |
          mkdir -p extensions/snipper-vscode/bin/linux-x64
          cp target/debug/snipper-lsp extensions/snipper-vscode/bin/linux-x64/snipper-lsp
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install dependencies
        working-directory: extensions/snipper-vscode
        run: npm ci
      - name: compile TypeScript
        working-directory: extensions/snipper-vscode
        run: npm run compile
      - name: run extension tests (headless)
        working-directory: extensions/snipper-vscode
        run: xvfb-run --auto-servernum npm test
        env:
          DISPLAY: ":99"

  vsix-package:
    # Produce one targeted VSIX per platform so serverPath.ts finds the bundled binary.
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            vsce-target: linux-x64
            bin-dir: linux-x64
            binary: snipper-lsp
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            vsce-target: win32-x64
            bin-dir: win32-x64
            binary: snipper-lsp.exe
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            vsce-target: darwin-arm64
            bin-dir: darwin-arm64
            binary: snipper-lsp
          - os: macos-latest
            rust-target: x86_64-apple-darwin
            vsce-target: darwin-x64
            bin-dir: darwin-x64
            binary: snipper-lsp
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
        with:
          targets: ${{ matrix.rust-target }}
      - name: ensure cross-compile target is available
        run: rustup target add ${{ matrix.rust-target }}
      - uses: Swatinem/rust-cache@v2
      - name: build snipper-lsp (release)
        run: cargo build -p snipper-lsp --release --target ${{ matrix.rust-target }}
      - name: stage LSP binary (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p extensions/snipper-vscode/bin/${{ matrix.bin-dir }}
          cp target/${{ matrix.rust-target }}/release/${{ matrix.binary }} \
            extensions/snipper-vscode/bin/${{ matrix.bin-dir }}/${{ matrix.binary }}
      - name: stage LSP binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force `
            extensions/snipper-vscode/bin/${{ matrix.bin-dir }} | Out-Null
          Copy-Item `
            target/${{ matrix.rust-target }}/release/${{ matrix.binary }} `
            extensions/snipper-vscode/bin/${{ matrix.bin-dir }}/${{ matrix.binary }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install dependencies
        working-directory: extensions/snipper-vscode
        run: npm ci
      - name: compile TypeScript
        working-directory: extensions/snipper-vscode
        run: npm run compile
      - name: package VSIX (targeted)
        working-directory: extensions/snipper-vscode
        run: >-
          npm run package --
          --target ${{ matrix.vsce-target }}
          --out snipper-vscode-${{ matrix.vsce-target }}.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: snipper-vscode-vsix-${{ matrix.vsce-target }}
          path: extensions/snipper-vscode/snipper-vscode-${{ matrix.vsce-target }}.vsix
          retention-days: 30

  vs-unit-tests:
    # Unit tests for pure-BCL helpers (LspSnippetConverter, SnipperBinaryLocator).
    # Runs on ubuntu so the Windows VSIX build is not a prerequisite for fast feedback.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"
      - name: test
        run: >-
          dotnet test
          extensions/snipper-vs/Snipper.VisualStudio.Tests/Snipper.VisualStudio.Tests.csproj
          --configuration Release --logger "console;verbosity=normal"

  vs-integration-tests:
    # Mock-mode integration tests: Microsoft.VisualStudio.Sdk.TestFramework.Xunit
    # spins up a mocked VS service container — no real IDE install required.
    # net472 must run on Windows (Windows-only COM shims in the test framework).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"
      - name: restore
        run: >-
          dotnet restore
          extensions/snipper-vs/Snipper.VisualStudio.IntegrationTests/Snipper.VisualStudio.IntegrationTests.csproj
      - name: test
        run: >-
          dotnet test
          extensions/snipper-vs/Snipper.VisualStudio.IntegrationTests/Snipper.VisualStudio.IntegrationTests.csproj
          --configuration Release --logger "console;verbosity=normal"

  vsix-package-vs:
    # Build the Visual Studio VSIX with snipper-lsp.exe bundled (Windows x64).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: build snipper-lsp (windows release)
        run: cargo build -p snipper-lsp --release --target x86_64-pc-windows-msvc
      - name: stage LSP binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force `
            extensions/snipper-vs/Snipper.VisualStudio/bin | Out-Null
          Copy-Item `
            target/x86_64-pc-windows-msvc/release/snipper-lsp.exe `
            extensions/snipper-vs/Snipper.VisualStudio/bin/snipper-lsp.exe
      - uses: microsoft/setup-msbuild@v2
      - name: restore NuGet packages
        run: >-
          dotnet restore
          extensions/snipper-vs/Snipper.VisualStudio/Snipper.VisualStudio.csproj
      - name: build VSIX
        run: >-
          msbuild
          extensions/snipper-vs/Snipper.VisualStudio/Snipper.VisualStudio.csproj
          /p:Configuration=Release /t:Build /m
      - uses: actions/upload-artifact@v4
        with:
          name: snipper-vs-vsix
          path: extensions/snipper-vs/Snipper.VisualStudio/bin/Release/**/*.vsix
          retention-days: 30

  rust-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny --all-features check

  fuzz-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - name: cargo build (isolated fuzz/ crate)
        run: cargo build --manifest-path fuzz/Cargo.toml

  fuzz-smoke:
    # Bounded smoke run of the P0 fuzz targets (~60 s/target). Blocking gate.
    # Deep runs are on the nightly schedule (fuzz-nightly.yml).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: bounded smoke (parse_context)
        run: >-
          cargo +nightly fuzz run parse_context
          --target x86_64-unknown-linux-gnu
          -- -max_total_time=60 -rss_limit_mb=2048
      - name: bounded smoke (receiver_range)
        run: >-
          cargo +nightly fuzz run receiver_range
          --target x86_64-unknown-linux-gnu
          -- -max_total_time=60 -rss_limit_mb=2048
      - name: bounded smoke (render_template)
        run: >-
          cargo +nightly fuzz run render_template
          --target x86_64-unknown-linux-gnu
          -- -max_total_time=60 -rss_limit_mb=2048
      - name: bounded smoke (render_prefix_template)
        run: >-
          cargo +nightly fuzz run render_prefix_template
          --target x86_64-unknown-linux-gnu
          -- -max_total_time=60 -rss_limit_mb=2048
      - name: bounded smoke (render_surround_template)
        run: >-
          cargo +nightly fuzz run render_surround_template
          --target x86_64-unknown-linux-gnu
          -- -max_total_time=60 -rss_limit_mb=2048
