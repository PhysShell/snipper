# cargo-deny configuration — supply-chain / license / source policy.
# See https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
db-path  = "~/.cargo/advisory-dbs"
db-urls  = ["https://github.com/rustsec/advisory-db"]
yanked   = "deny"
ignore   = []

[licenses]
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards         = "deny"
deny              = []

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
